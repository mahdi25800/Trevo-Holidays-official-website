<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trevo Holidays | Travel Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="shortcut icon" href="./image/4.png" type="image/x-icon">

<style>
    #bg-image {
        background-image: url('./image/bg-image.avif');
        background-size: cover;
        background-position: center;
        /* ফিক্সড উইডথ বাদ দিয়ে ১০০% করা হয়েছে */
        width: 100%; 
        min-height: 80vh; /* স্ক্রিন অনুযায়ী হাইট অ্যাডজাস্ট হবে */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
    }

    #leyer {
        width: 100%;
        height: 100%;
        min-height: 80vh;
        background-color: rgba(1, 1, 8, 0.562);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px; /* মোবাইলে টেক্সট যেন বর্ডারে লেগে না যায় */
    }

    /* টেক্সট এনিমেশনের জন্য সাধারণ স্টাইল */
    .text-rotate {
        display: inline-block;
    }
</style>
</head>
<body class="bg-gray-100">
    <nav class="bg-gray-800 w-full p-4">
        <div class="container flex ">
            <div class="shadow-sm w-[80px] md:w-[100px]">
                <img src="./image/4.png" alt="Logo" class="w-full ">
            </div>
            </div>
    </nav>

    <section class="w-full">
        <div id="bg-image">
            <div id="leyer">
                <h1 class="font-bold text-4xl md:text-7xl mb-4">
                    <span class="text-rotate text-7xl duration-5000">
                  <span class="justify-items-center">
                  <span>Trevo</span>
                  <span class="font-bold italic px-2">Holidays <span class=" text-amber-300">▶︎▶︎<span>
                  </span>
                  </span>
                  </span>
                   </h1>
                
                <p class="text-sm md:text-lg max-w-2xl mx-auto px-4 text-center">
                    Discover breathtaking destinations, unique experiences, and unforgettable memories. Your journey starts here.
                </p>
            </div>
        </div>
    </section>

    <!-- card-section -->

    <section class="bg-gray-800 pb-[50px]">
        <h1 class="secton-title font-bold text-5xl py-[20px]  text-amber-50 text-center">Our Services</h1>
        <div class="card-section grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 py-[50px] ml-[100px]">
         <div class="card bg-base-100 w-96 shadow-sm">
  <figure>
    <img
      src="./image/air.avif" alt="Shoes" />
  </figure>
      <div class="card-body">
          <h2 class="card-title font-bold text-2xl pb-[50px] text-blue-400">Air Ticket</h2>
          <div class="card-actions justify-end">
              <button class="btn btn-primary ">Book Now</button>
            </div>
        </div>
    </div>

    <div class="card bg-base-100 w-96 shadow-sm">
  <figure>
    <img
      src="./image/hotel.jpg" alt="Hotel" />
  </figure>
      <div class="card-body">
          <h2 class="card-title font-bold text-2xl pb-[50px] text-blue-400">Hotel Booking</h2>
          <div class="card-actions justify-end">
              <button class="btn btn-primary ">Book Now</button>
            </div>
        </div>
    </div>

    <div class="card bg-base-100 w-96 shadow-sm">
  <figure>
    <img
      src="./image/visa.jpg" alt="Visa" />
  </figure>
      <div class="card-body">
          <h2 class="card-title font-bold text-2xl pb-[50px] text-blue-400">Visa Processing</h2>
          <div class="card-actions justify-end">
              <button class="btn btn-primary ">Book Now</button>
            </div>
        </div>
    </div>

    <div class="card bg-base-100 w-96 shadow-sm">
  <figure>
    <img
      src="./image/Tour-Package.jpg" alt="Tour-Packages" />
  </figure>
      <div class="card-body">
          <h2 class="card-title font-bold text-2xl pb-[50px] text-blue-400">Tour Packages</h2>
          <div class="card-actions justify-end">
              <button class="btn btn-primary ">Book Now</button>
            </div>
        </div>
    </div>
</div>
    </section>
</body>
</html>
